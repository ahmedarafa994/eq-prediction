# Configuration for the IDSP Multi-Type EQ Blind Estimator

experiment_name: "idsp-eq-multitype-blind-estimator"
seed: 42

data:
  num_bands: 5
  sample_rate: 44100
  audio_duration: 3.0
  n_fft: 2048
  hop_length: 256
  n_mels: 128
  gain_bounds: [-24.0, 24.0]
  freq_bounds: [20.0, 20000.0]
  q_bounds: [0.1, 10.0]
  filter_types: ["peaking", "lowshelf", "highshelf", "highpass", "lowpass"]
  type_weights: [0.5, 0.15, 0.15, 0.1, 0.1]
  dataset_size: 200000
  val_dataset_size: 2000
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  batch_size: 1024
  num_workers: 8

model:
  encoder:
    type: "tcn"
    n_mels: 128
    embedding_dim: 128
    channels: 128
    num_blocks: 4
    num_stacks: 2
    kernel_size: 3
  num_bands: 5
  learning_rate: 0.0001   # Reduced from 2e-4 to prevent oscillation
  weight_decay: 0.02

loss:
  # Combined param weight disabled — use independent per-parameter weights
  lambda_param: 0.0
  lambda_gain: 1.0       # Increased from 1.5 (strengthen gain signal, was 6dB plateau)
  lambda_freq: 1.5       # Increased from 1.0 (freq learning is critical)
  lambda_q: 1.5          # Increased from 1.0
  lambda_type: 3.0       # Increased to combat type collapse (was starving gain, type stuck at ~50%)
  lambda_spectral: 0.1   # was 1.0 — never fires (no audio prediction), dead weight
  lambda_hmag: 0.5       # Increased from 0.3 (drives freq/type via spectral shape)
  lambda_activity: 0.05  # Reduced from 0.1 (not used, dead weight)
  lambda_spread: 0.02    # Reduced from 0.05 (negative, pushes to extremes)
  lambda_freq_match: 1.0
  lambda_q_match: 0.5
  lambda_type_match: 2.0
  # Anti-collapse regularization
  lambda_embed_var: 1.0
  lambda_contrastive: 0.5  # Increased from 0.05
  embed_var_threshold: 0.1
  warmup_epochs: 5       # Gain-only warmup: epochs 0-4 gain only, 5+ freq/Q, 6+ type, 7+ spectral

trainer:
  max_epochs: 120
  accelerator: "auto"
  devices: 1
  precision: "bf16-mixed"
  log_every_n_steps: 10
  fast_dev_run: false
  gradient_accumulation_steps: 1
  # Optimization flags (QLoRA/Unsloth/DeepSpeed-inspired)
  use_8bit_optimizer: false
  use_torch_compile: true
  use_gradient_checkpointing: false
  use_activation_quantization: false
  use_deepspeed: false
  deepspeed_config: "conf/deepspeed_config.json"
  precompute_cache_path: "data/dataset_musdb_200k.pt"
  early_stopping_patience: 15
  monitor_val_metric: "val_loss"
  mode: "min"

curriculum:
  stages:
    - name: "warmup"
      epochs: 10
      lambda_type: 1.5
      gumbel_temperature: 1.5    # Reduced from 2.0 (was too uniform)
      learning_rate_scale: 1.0   # No LR reset at stage entry
    - name: "type_learning"
      epochs: 20
      lambda_type: 2.0
      gumbel_temperature: 0.8    # Reduced from 1.0 (sharper types)
      learning_rate_scale: 1.0   # No LR reset at stage entry
    - name: "consolidation"
      epochs: 30
      lambda_type: 5.0           # Increased from 2.0 to combat peaking filter collapse
      gumbel_temperature: 0.3    # Reduced from 0.5
      learning_rate_scale: 1.0   # No LR reset at stage entry
    - name: "finetune"
      epochs: 10
      lambda_type: 1.5
      gumbel_temperature: 0.05
      learning_rate_scale: 0.1   # Intentional final LR reduction
